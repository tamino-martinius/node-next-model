name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r build
      - run: pnpm typecheck
      # native db connectors require live services; covered by their dedicated jobs
      - run: pnpm -r --filter '!@next-model/postgres-connector' --filter '!@next-model/mysql-connector' --filter '!@next-model/mariadb-connector' --filter '!@next-model/redis-connector' --filter '!@next-model/valkey-connector' coverage

  test-postgres-connector:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @next-model/core --filter @next-model/postgres-connector -r build
      - name: Test postgres-connector against Postgres 17
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm --filter @next-model/postgres-connector coverage

  test-mysql-connector:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @next-model/core --filter @next-model/mysql-connector -r build
      - name: Test mysql-connector against MySQL 8
        env:
          DATABASE_URL: mysql://root:mysql@127.0.0.1:3306/test
        run: pnpm --filter @next-model/mysql-connector coverage

  test-mariadb-connector:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: mariadb
          MARIADB_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h localhost -pmariadb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @next-model/core --filter @next-model/mysql-connector --filter @next-model/mariadb-connector -r build
      - name: Test mariadb-connector against MariaDB 11
        env:
          DATABASE_URL: mysql://root:mariadb@127.0.0.1:3306/test
        run: pnpm --filter @next-model/mariadb-connector coverage

  test-redis-connector:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @next-model/core --filter @next-model/redis-connector -r build
      - name: Test redis-connector against Redis 7
        env:
          REDIS_URL: redis://127.0.0.1:6379
        run: pnpm --filter @next-model/redis-connector coverage

  test-valkey-connector:
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @next-model/core --filter @next-model/redis-connector --filter @next-model/valkey-connector -r build
      - name: Test valkey-connector against Valkey 8
        env:
          VALKEY_URL: redis://127.0.0.1:6379
        run: pnpm --filter @next-model/valkey-connector coverage

  test-knex-real-db:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: [pg, mysql2]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @next-model/core --filter @next-model/knex-connector -r build
      - name: Test knex-connector against ${{ matrix.client }}
        env:
          KNEX_TEST_CLIENT: ${{ matrix.client }}
          DATABASE_URL: ${{ matrix.client == 'pg' && 'postgres://postgres:postgres@127.0.0.1:5432/postgres' || 'mysql://root:mysql@127.0.0.1:3306/test' }}
        run: pnpm --filter @next-model/knex-connector test
