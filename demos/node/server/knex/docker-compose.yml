services:
  postgres:
    image: postgres:17
    profiles: [pg]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextmodel_demo
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 5s
      timeout: 3s
      retries: 10
  mysql:
    image: mysql:8
    profiles: [mysql]
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: nextmodel_demo
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-pmysql']
      interval: 5s
      timeout: 3s
      retries: 20
